server {
    listen 80;

    server_name nktx.dev www.nktx.dev market-detail.nktx.dev;

    error_log  /var/log/nginx/http_error.log;
    access_log /var/log/nginx/http_access.log;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;

    server_name nktx.dev www.nktx.dev;

    root /var/www;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/nktx.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nktx.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    error_log  /var/log/nginx/https_error.log;
    access_log /var/log/nginx/https_access.log;

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.html?$query_string;
    }

    client_max_body_size 512M;
}

server {
    listen 443 ssl;
    http2 on;

    server_name market-detail.nktx.dev;

    ssl_certificate /etc/letsencrypt/live/nktx.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nktx.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    error_log  /var/log/nginx/market_detail_error.log;
    access_log /var/log/nginx/market_detail_access.log;

    location / {
        proxy_pass https://host.docker.internal:444;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name market-detail.nktx.dev;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    client_max_body_size 512M;
}
